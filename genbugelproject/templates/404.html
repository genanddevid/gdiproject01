{% extends 'base.html' %}
{% block content %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500&display=swap');

  .error-page {
    min-height: 80vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
    background: #fff;
  }

  .error-code {
    font-family: 'Playfair Display', serif;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #B83C2E;
    margin-bottom: 16px;
  }

  .error-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1.2;
    margin-bottom: 16px;
    max-width: 320px;
  }

  .error-body {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: #888;
    line-height: 1.7;
    max-width: 280px;
    margin-bottom: 40px;
  }

  .error-retry {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #1a1a1a;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
    padding: 14px 32px;
    border-radius: 50px;
    text-decoration: none;
    transition: background 0.2s;
  }

  .error-retry:hover {
    background: #B83C2E;
    color: #fff;
  }

  .error-divider {
    width: 40px;
    height: 1px;
    background: #e0e0e0;
    margin: 32px auto;
  }

  .error-home {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: #aaa;
    text-decoration: none;
    letter-spacing: 0.3px;
  }

  .error-home:hover {
    color: #B83C2E;
  }
</style>

<div class="error-page">
  <p class="error-code">Page not found</p>

  <h1 class="error-title">This story has moved on.</h1>

  <p class="error-body">
    The page you're looking for doesn't exist or has been removed.
  </p>

  <a href="/" class="error-retry">
    ← &nbsp; Back to Baytruyen
  </a>

  <div class="error-divider"></div>

  <a href="/" class="error-home">Return to Baytruyen</a>
</div>
{% endblock %}
