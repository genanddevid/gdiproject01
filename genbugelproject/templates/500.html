{% extends 'base.html' %}
{% block content %}
<div style="text-align: center; padding: 60px 20px;">
    <p style="font-size: 18px; color: #888; margin-bottom: 20px;">
        Something went wrong. Please try again.
    </p>
    <button onclick="window.location.reload()" 
        style="background: #000; color: white; border: none; border-radius: 50px;
        padding: 12px 28px; font-size: 15px; cursor: pointer;">
        Try again
    </button>
</div>
{% endblock %}
