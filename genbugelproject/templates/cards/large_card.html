
<style>
  .large-card-wrapper {
    width: 543px;
    margin-bottom: -5px;
  }

  .no-gap {
    width: 543px;
    background-color:#ffffff;
    padding: 1.0rem 1.0rem 0.0rem 1.0rem;
    border-radius: 0; 
    box-shadow: none; 
        position: relative;
         margin-bottom: 5px !important;
  }

  @media (max-width: 768px) {
    .large-card-wrapper {
      width: 100% !important;
      margin: 0 !important;
      padding: 0 !important;
      box-sizing: border-box;
    }
    .card {
      width: 100% !important;
      margin: 0 !important;
      padding: 0 !important;
      box-sizing: border-box;
      border-radius: 0 !important;
      box-shadow: none !important;
    }

    .no-gap {
  padding: 0 !important;
}

.card-content {
  margin-left: -10px !important;
  padding-right: 8px !important;
}

.content a {
  color: rgb(0, 0, 0) !important;
  
}
.timeset {
margin-top: -20px !important;
  }
}
</style>



<div class="large-card-wrapper">

  
    <div style="background-color: rgb(156, 187, 18); padding: 0;">
     
            <!--large Card  -->
          <!-- DEBUG: This is the large card -->

        <div class="card no-gap">     
          <div class="card-image">
            <figure class="image is-3by2" style="margin: 0;">
              <a href="{% url 'postdetails' post_item.id %}" onclick="openPostModal('{{ post_item.id }}')">
                <img
                  src="{{ post_item.picture.url }}"
                  alt="Placeholder image"
                  style="border-radius: 9px; margin-bottom: 0; display: block; object-fit:cover; width: 100%; height: 100%;"
                />
              </a>
            </figure>
          </div>

          <div class="card-content" style="margin-top: -5px; margin-left: -20px;">
            <div class="media" style="align-items: center; margin-bottom: 10.76px; margin-top: -3.76px;">
              <div class="media-left">
                <figure class="image is-24x24">
                  <a href="{% url 'profile' post_item.user.username %}" onclick="event.stopPropagation();">

                    {% if post_item.user.profile.picture %}
        <img class="is-rounded"
             src="{{ post_item.user.profile.picture.url }}"
             style="width: 24px; height: 24px; object-fit: cover; background-color: #6d6d6d;">
      {% else %}
        <span class="material-icons"
              style="width: 24px; height: 24px; font-size: 30px;
                     display: flex; align-items: center; justify-content: center;
                     border-radius: 50%; background-color: #6d6d6d; color: #d9d9d9;">
          account_circle
        </span>
      {% endif %}
                </figure>
              </div>

              <div class="media-content" style="margin-left: -10px; overflow: hidden;">
                <a href="{% url 'profile' post_item.user.username %}" onclick="event.stopPropagation();">
                  {% if post_item.user.profile.first_name %}
                  <p class="title is-4" style="
                    font-weight:500;
                    font-family: 'Inter', sans-serif;
                    font-size: 13px;
                    letter-spacing: -0.1px;
                    margin: 0;
                    color:rgb(59, 59, 59);"
                  >{{ post_item.user.profile.first_name }} {{ post_item.user.profile.last_name }}</p>
                  {% else %}
                  <p class="title is-4" style="font-weight:500; font-size: 13px; margin: 0;">{{ post.user.username }}</p>
                  {% endif %}
                  <!--<p class="subtitle is-6">@{{ post_item.user.username }}</p>-->
                </a>
              </div>
            </div>
               
            <div class="content" style="margin-top: 7px; font-weight:600; font-size: 18.15px; display: -webkit-box; -webkit-box-orient: vertical; 
          -webkit-line-clamp: 3; line-clamp: 3; overflow: hidden; text-overflow: ellipsis; line-height: 1.4em; 
          min-height: 2.0em; max-height: 4.2em; width: 100%;">
              <a href="{% url 'postdetails' post_item.id %}" style="
                
                font-family: 'Inter', sans-serif; color: rgb(27, 27, 27);
                letter-spacing: -0.3px; 
                
                ">
                {{ post_item.caption }}
              </a>
              </div>
              <!--<a href="#">#css</a>
              <a href="#">#responsive</a>-->    
              
              <div class="timeset" style="margin-top: -15px;">
                <time datetime="2016-1-1" style="color: rgb(59, 59, 59); font-weight:500; font-family: 'Inter', sans-serif;
                  font-size: 10.9px;">{{ post_item.posted }}</time>
              </div>
            </div>
          

          
        </div>

      <!--<div style="
            position: absolute;
            bottom: 0px;
            left: 9.3%;
            width: 51.15%;
            height: 1px;
            background-color: rgb(230, 230, 230);
          ">
          </div>-->
      
        </div>

      </div>
