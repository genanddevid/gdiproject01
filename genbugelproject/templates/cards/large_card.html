



<div style="width: 543px; background-color: rgb(28, 223, 70); margin-top: -0px; margin-bottom: -5px;">
  
    <div style="background-color: rgb(156, 187, 18); padding: 0 0 0 0; width: 543px; 
    margin-left: 0px; margin-top: 0px;">
     
            <!--large Card  -->
          <!-- DEBUG: This is the large card -->

        <div class="card no-gap" style="width: 543px; background-color:#ffffff; margin-bottom: 5px;
        padding: 1.0rem 1.0rem 0.0rem 1.0rem; border-radius: 0; box-shadow: none; 
        position: relative;">     
          <div class="card-image">
            <figure class="image is-3by2" style="margin: 0;">
              <a href="{% url 'postdetails' post_item.id %}" onclick="openPostModal('{{ post_item.id }}')">
                <img
                  src="{{ post_item.picture.url }}"
                  alt="Placeholder image"
                  style="border-radius: 0.27676%; margin-bottom: 0; display: block;"
                />
              </a>
            </figure>
          </div>

          <div class="card-content" style="margin-top: -5px; margin-left: -20px;">
            <div class="media" style="align-items: center; margin-bottom: 10.76px; margin-top: -3.76px;">
              <div class="media-left">
                <figure class="image is-24x24">
                  <a href="{% url 'profile' post_item.user.username %}" onclick="event.stopPropagation();">
                    <img class="is-rounded"
                      src="{% if post_item.user.profile.picture %}{{ post_item.user.profile.picture.url }}{% else %}https://bulma.io/assets/images/placeholders/24x24.png{% endif %}"
                      style="width: 24px; height: 24px; object-fit: cover;">
                  </a>
                </figure>
              </div>

              <div class="media-content" style="margin-left: -10px;">
                <a href="{% url 'profile' post_item.user.username %}" onclick="event.stopPropagation();">
                  {% if post_item.user.profile.first_name %}
                  <p class="title is-4" style="
                    font-weight:600;
                    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                    font-size: 11.5px;
                    margin: 0;
                    color:rgb(63, 63, 63);"
                  >{{ post_item.user.profile.first_name }} {{ post_item.user.profile.last_name }}</p>
                  {% else %}
                  <p class="title is-4">Unknown</p>
                  {% endif %}
                  <!--<p class="subtitle is-6">@{{ post_item.user.username }}</p>-->
                </a>
              </div>
            </div>
               
            <div class="content">
              <a href="{% url 'postdetails' post_item.id %}" style="
                font-size: clamp(13px, 3vw, 19.4px); font-weight:100; 
                font-family: 'Inter', sans-serif; line-height: 1.2; color: rgb(37, 37, 37);
                letter-spacing: -0.4px;
                @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
                ">
                {{ post_item.caption }}
              </a>
              <!--<a href="#">#css</a>
              <a href="#">#responsive</a>-->    
              <br>
              <div style="margin-top: 6px;">
                <time datetime="2016-1-1" style="color: #676767; font-family: 'Inter', sans-serif;
                  font-size: 10.9px;">{{ post_item.posted }}</time>
              </div>
            </div>
          </div>

          
        </div>

      <div style="
            position: absolute;
            bottom: 0px;
            left: 5%;
            width: 90%;
            height: 1px;
            background-color: rgb(230, 230, 230);
          ">
          </div>
      
        </div>

      </div>
