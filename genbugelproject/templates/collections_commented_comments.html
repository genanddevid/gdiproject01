{% extends "base.html" %}
{% load static %}
{% block content %}


<div style="max-width: 525px; margin: auto;">
<div class="tabs is-centered">
    <ul>
        <li class="is-active">
            <a><i class="material-icons">chat_bubble_outline</i>Comments you replied to</a>
        </li>
        <li>
          <a href="{% url 'collections_liked_comments' %}">         
            <i class="material-icons">favorite_border</i>Comments you liked
          </a>
        </li>
    </ul>
</div>
</div>

{% for post in posts %}
   
    <!-- First Article Card -->   
    <div class="box" style="max-width: 525px; margin: auto; box-shadow: none; border-radius: 0;">
        <article class="media">
            <!-- Photo heading of Article-->
            <div class="media-left" style="display: flex; flex-direction: column; justify-content: space-between;">
                <figure class="image is-100x100" style="margin:0;">
                    <a href="{{ post.get_absolute_url }}"><img src="{{ post.picture.url }}" alt="Image" style="width: 100px; height: 100px; object-fit: cover;"/></a>
                </figure>
            </div>

            <div class="media-content" style="display: flex; flex-direction: column; justify-content: space-between;">
                <div class="content" style="margin-top: -13px;">
        
                    <!-- Aligns to top -->
                    <div class="media" style="align-items: center; border-top: none; margin-bottom: 0.25rem;">
                        <!-- Profile Picture of article writer -->
                        <div class="media-left">
                            <a href="{% url 'profile' post.user.username %}">
                            <figure class="image is-24x24" style="margin: 0;">
                                
                                    <img class="is-rounded"
                        src="{% if post.user.profile.picture %}{{ post.user.profile.picture.url }}{% else %}https://bulma.io/assets/images/placeholders/24x24.png{% endif %}"
                        style="width: 24px; height: 24px; object-fit: cover;">
                                
                            </figure>
                            </a>
                        </div>
                        <!-- Name -->
                        <div class="media-content" style="margin-left: -10px;">
                            <a href="{% url 'profile' post.user.username %}">
                            <p class="title is-4" style="
                                font-weight:bolder;
                                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                                font-size: 12px;
                                margin: 0;
                                ">{{ post.user.username }}
                            </p>
                            </a>
                        </div>
                    </div>
                    <!-- Article Title -->
                    <div style="
            margin-top: 7px;
                    font-size: 16.0px;
                    display: -webkit-box;
                    -webkit-box-orient: vertical;
                    -webkit-line-clamp: 2;
                    line-clamp: 2;
                    overflow: hidden;
                    text-overflow: ellipsis;
                    line-height: 1.2em;
                    max-height: 2.4em;
          ">
          <a href="{{ post.get_absolute_url }}" style="color: inherit; text-decoration: none;">
            {{ post.caption }}
            </a>
          </div>
                    

                </div>
                <!-- Date and time written -->
                <div style="margin-top: 2px;">
                  <time datetime="2016-1-1" style="color: #676767; font-family: 'Inter', sans-serif; font-size: 10.5px;">
                    {{ post.posted }}
                  </time>
                </div>
            </div>
            

        </article>
    </div>
   

    {% endfor %}
    
{% endblock %}
