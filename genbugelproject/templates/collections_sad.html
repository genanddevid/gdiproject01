{% extends 'base.html' %}

{% load static %}

{% block content %}
            
<div class="tabs is-centered">
    <ul>
        <!--<li>
            <a><i class="material-icons">dashboard</i>Posts</a>
        </li>-->
        <li class="is-active">
            <a><i class="material-icons">save_alt</i>Saved</a>
        </li>
    </ul>
</div>
      

<!--<div class="columns is-mobile is-multiline is-centered">-->
   <!-- {% for post in posts %}-->
    <!-- First Article Card -->   
    <div class="box" style="max-width: 500px; margin: auto; box-shadow: none;">
        <article class="media">
            <!-- Photo heading of Article-->
            <div class="media-left" style="display: flex; flex-direction: column; justify-content: space-between;">
                <figure class="image is-100x100" style="margin:0;">
                    <a href="{{ post.get_absolute_url }}"><img src="{{ post.picture.url }}" alt="Image" style="width: 100px; height: 100px; object-fit: cover;"/></a>
                </figure>
            </div>

            <div class="media-content" style="display: flex; flex-direction: column; justify-content: space-between;">
                <div class="content" style="margin-top: -13px;">
        
                    <!-- Aligns to top -->
                    <div class="media" style="align-items: center; border-top: none; margin-bottom: 0.25rem;">
                        <!-- Profile Picture of article writer -->
                        <div class="media-left">
                            <figure class="image is-24x24" style="margin: 0;">
                                <img
                                    src="https://bulma.io/assets/images/placeholders/96x96.png"
                                    alt="Placeholder image"
                                    style="border-radius: 50%;"
                                />
                            </figure>
                        </div>
                        <!-- Name -->
                        <div class="media-content" style="margin-left: -10px;">
                            <p class="title is-4" style="
                                font-weight:bolder;
                                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                                font-size: 12px;
                                margin: 0;
                                ">{{ post.user.username }}
                            </p>
                        </div>
                    </div>
                    <!-- Article Title -->
                    <div style="
                    margin-top: 7px;
                    font-size: 17px;
                    display: -webkit-box;
                    -webkit-box-orient: vertical;
                    -webkit-line-clamp: 2;
                    line-clamp: 2;
                    overflow: hidden;
                    text-overflow: ellipsis;
                    line-height: 1.3em;
                    max-height: 2.4em;
                  ">
                    {{ post.caption }}
                  </div>
                    

                </div>
                <!-- Date and time written -->
                <div style="margin-top: 2px;">
                  <time datetime="2016-1-1" style="color: #676767; font-family: 'Inter', sans-serif; font-size: 10.5px;">
                    {{ post.posted }}
                  </time>
                </div>
            </div>
            

        </article>
    </div>

    <!-- {% endfor %}-->
    <!--</div>-->

   <!-- {% endblock %}-->
