

{% extends 'base.html' %}
{% load static %}

{% block content %}

<style>

  margin: 0 auto;

  background-color: rgb(17, 143, 165);

}

    margin: 0 !important;
    padding: 0 !important;
    width: 100% !important;
    max-width: 100% !important;
    overflow-x: hidden;
  }
}

  </style>

<div class="medium-card-group responsive-group" style="position: relative; margin-left: 100px;">
    {% for post in posts %}
      <div class="post-card" data-post-id="{{ post.id }}" onclick="openPostModal('{{ post.id }}', event)">
        {% include "cards/medium_card.html" with post=post %}
      </div>
       {% endfor %}




  <!-- Modal container -->
<div id="postModal" class="my-modal" style="display: none;">
  <button id="modalPrevBtn" class="modal-nav-btn modal-nav-btn-left" onclick="showPreviousPost()">&#10094;</button>
  <button class="my-close-button" onclick="closePostModal()">&times;</button>
  <div class="my-modal-content" id="modalContent">
    
    <div id="modalBody"></div>
  </div>
  <button id="modalNextBtn" class="modal-nav-btn modal-nav-btn-right" onclick="showNextPost()">&#10095;</button>
</div>

<style>

 /* Add these styles for the navigation buttons */
.modal-nav-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background-color: rgb(0, 0, 0); /* Semi-transparent background */
  color: white;
  border: none;
  
  padding-left: 15px;
  padding-top: 19px;
  padding-bottom: 21px;
  padding-right: 15px;

  cursor: pointer;
  font-size: 2em; /* Make arrows larger */
  z-index: 10000; /* Ensure they are above the modal background */
  border-radius: 5px; /* Slightly rounded corners */
  transition: background-color 0.3s ease; /* Smooth hover effect */
  user-select: none; /* Prevent text selection */
 /* opacity: 0.8; Slight transparency */
}


.modal-nav-btn:hover {
  background-color: rgba(0, 0, 0, 0.5);
  opacity: 1;
}

.modal-nav-btn-left {
  left: 20px; /* Distance from left edge */
}

.modal-nav-btn-right {
  right: 20px; /* Distance from right edge */
}

.modal-nav-btn:disabled {
  opacity: 0.3; /* Visually indicate disabled state */
  cursor: not-allowed;
}

/* Your existing modal and close button styles here */
 

/* Modal background */
.my-modal {
  
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.6);
  z-index: 9999;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Modal content box */
.my-modal-content {
  background: white;
  width: 100%;
  max-width: 905px;
  height: 96vh;
  overflow-y: auto;
  border-radius: 0px;
  padding-left: 75px;
            padding-right: 75px;
            padding-top: 25px;
  position: relative;
}

/* Freely movable close button */
.my-close-button {
  position: absolute;
  top: 10px; /* Adjust the distance above the modal */
  right: 20px; /* Adjust the distance to the right of the modal */

  font-size: 25px;
  cursor: pointer;
  background-color: white; /* Optional: Add a background for visibility */
  border: none;
  border-radius: 50%; /* Makes the close button circular */
  width: 30px;
  height: 30px; /* Keep height explicitly set */
  line-height: 30px; /* Add this: Make line-height equal to height for better vertical alignment */
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 5px rgba(99, 98, 98, 0.2); /* Optional: Add a subtle shadow */
  
  /* --- FIX FOR CENTERING THE 'X' --- */
  padding-bottom: 5px; /* Adjust this value (e.g., 1px, 2px) to visually center the 'X' */
  /* You might also try transform: translateY(1px); instead of padding-bottom for more precise nudging if needed */
}
/* Optional: Style on hover */
.close-button:hover {
  background: #eee;
}

/* Add this new class */
.no-scroll {
  overflow: hidden !important;
  position: fixed;
  width: 100%;
}
</style>

<script>

  
let allPostIds = []; // Global array to store all post IDs in order
let currentPostIndex = -1; // Global variable to store the index of the currently viewed post

// Function to initialize allPostIds array when the page loads
document.addEventListener('DOMContentLoaded', () => {
    const postCards = document.querySelectorAll('.post-card');
    postCards.forEach(card => {
        const postId = card.dataset.postId; 
        if (postId) {
            allPostIds.push(postId);
        }
    });
});

// Helper function to update the navigation button states
function updateNavButtons() {
    const prevBtn = document.getElementById('modalPrevBtn');
    const nextBtn = document.getElementById('modalNextBtn');

    if (prevBtn && nextBtn) {
        prevBtn.disabled = (currentPostIndex <= 0);
        nextBtn.disabled = (currentPostIndex >= allPostIds.length - 1);
    }
}

// Function to load and display post content in modal
function loadPostContent(postId) {
    fetch(`/modal/${postId}/`)
        .then(response => {
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            return response.text();
        })
        .then(html => {
            document.getElementById("modalBody").innerHTML = html;

            // Instagram
            if (window.instgrm && instgrm.Embeds) {
                instgrm.Embeds.process();
            }

            // Twitter/X
            const existingTwitterScript = document.querySelector('script[src="https://platform.twitter.com/widgets.js"]');
            if (existingTwitterScript) existingTwitterScript.remove();
            const twitterScript = document.createElement('script');
            twitterScript.src = "https://platform.twitter.com/widgets.js";
            twitterScript.async = true;
            twitterScript.charset = "utf-8";
            document.body.appendChild(twitterScript);

            // TikTok
            const oldTikTokScript = document.querySelector('script[src="https://www.tiktok.com/embed.js"]');
            if (oldTikTokScript) oldTikTokScript.remove();
            const tiktokScript = document.createElement('script');
            tiktokScript.src = "https://www.tiktok.com/embed.js";
            tiktokScript.async = true;
            document.body.appendChild(tiktokScript);

            // Scroll modal content to top
            document.getElementById('modalContent').scrollTop = 0;
        })
        .catch(error => {
            console.error('Error loading post content:', error);
            document.getElementById("modalBody").innerHTML = "<p>Error loading post. Please try again.</p>";
        });
}

function openPostModal(postId, event) {
    if (event) event.preventDefault();

    currentPostIndex = allPostIds.indexOf(postId);

    if (currentPostIndex === -1) {
        console.error("Post ID not found in allPostIds array:", postId);
        loadPostContent(postId);
        document.getElementById("postModal").style.display = "flex";
        document.body.classList.add("no-scroll");
        document.documentElement.classList.add("no-scroll");
        return; 
    }

    loadPostContent(postId);
    document.getElementById("postModal").style.display = "flex";
    document.body.classList.add("no-scroll");
    document.documentElement.classList.add("no-scroll");
    updateNavButtons();
}

function closePostModal() {
    document.getElementById("postModal").style.display = "none";
    document.getElementById("modalBody").innerHTML = "";
    document.body.classList.remove("no-scroll");
    document.documentElement.classList.remove("no-scroll"); 
    currentPostIndex = -1;
    window.tiktokEmbedLoaded = false;
}

function showNextPost() {
    if (currentPostIndex < allPostIds.length - 1) {
        currentPostIndex++;
        const nextPostId = allPostIds[currentPostIndex];
        loadPostContent(nextPostId);
        updateNavButtons();
    }
}

function showPreviousPost() {
    if (currentPostIndex > 0) {
        currentPostIndex--;
        const prevPostId = allPostIds[currentPostIndex];
        loadPostContent(prevPostId);
        updateNavButtons();
    }
}

// Optional: Keyboard navigation
document.addEventListener('keydown', (event) => {
    if (document.getElementById("postModal").style.display === "flex") {
        if (event.key === 'ArrowRight') {
            showNextPost();
        } else if (event.key === 'ArrowLeft') {
            showPreviousPost();
        } else if (event.key === 'Escape') {
            closePostModal();
        }
    }
});

document.getElementById('modalBody').addEventListener('click', function (event) {
  const postLikeBtn = event.target.closest('.like-post-btn');
  const commentLikeBtn = event.target.closest('.like-btn');

  // 🔵 Handle post like (only if .like-post-btn was clicked)
  if (postLikeBtn) {
    event.preventDefault();

    const postId = postLikeBtn.dataset.postId;

    fetch(`/${postId}/like`, {
      method: 'POST',
      headers: {
        'X-CSRFToken': getCookie('csrftoken'),
        'Content-Type': 'application/json'
      },
    })
    .then(response => response.json())
    .then(data => {
      const icon = postLikeBtn.querySelector('i');
      const countElem = document.getElementById(`like-count-${postId}`);

      if (icon) {
        icon.style.color = data.liked ? 'rgb(50, 115, 220)' : 'rgb(134, 134, 129)';
      }

      if (countElem) {
        countElem.textContent = data.likes;
      }
    })
    .catch(err => console.error('Post like failed:', err));
  }

  // 🟢 Handle comment like (only if .like-btn was clicked and not inside a post like)
  if (commentLikeBtn && !postLikeBtn) {
    event.preventDefault();

    const commentId = commentLikeBtn.dataset.commentId;

    fetch(`/comment/${commentId}/like/`, {
      method: 'POST',
      headers: {
        'X-CSRFToken': getCookie('csrftoken'),
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({})
    })
    .then(response => response.json())
    .then(data => {
      const likeCountId = `like-count-${commentId}`;
      let likeSpan = document.getElementById(likeCountId);

      if (data.likes > 0) {
        const likeText = `${data.likes}`;

        if (likeSpan) {
          likeSpan.innerText = likeText;
        } else {
          likeSpan = document.createElement('span');
          likeSpan.className = 'like-count';
          likeSpan.id = likeCountId;
          likeSpan.innerText = likeText;
          commentLikeBtn.insertAdjacentElement('afterend', likeSpan);
        }
      } else {
        if (likeSpan) {
          likeSpan.remove();
        }
      }
    })
    .catch(err => console.error('Comment like failed:', err));
  }
});



document.getElementById('modalBody').addEventListener('click', function (event) {
  const target = event.target;

  if (target.closest('.save-post-btn')) {
  event.preventDefault();

  const saveBtn = target.closest('.save-post-btn');
  const postId = saveBtn.dataset.postId;

  fetch(`/${postId}/favorite`, {

    },
  })

      }
    }

}



  // ✅ Add this block for SHOW MORE COMMENTS bar
  if (target.id === 'viewcomments-bar') {
    document.querySelectorAll(".comment-wrapper.is-hidden").forEach(el => {
      el.classList.remove("is-hidden");
    });

  // Handle reply toggle
  if (target.classList.contains('reply-btn')) {
    event.preventDefault();
    const commentId = target.dataset.commentId;
    const replyForm = document.getElementById(`reply-form-${commentId}`);
    if (replyForm) {
      replyForm.style.display = (replyForm.style.display === 'none') ? 'block' : 'none';
    }
  }

  // Handle "View replies"
  if (target.classList.contains('view-replies-btn')) {

    const commentId = target.dataset.commentId;
    const replyCount = target.dataset.replyCount;
    const repliesSection = document.getElementById(`replies-${commentId}`);

    if (repliesSection) {
      const isVisible = repliesSection.style.display === 'block';
      repliesSection.style.display = isVisible ? 'none' : 'block';
      target.textContent = isVisible ? `View replies (${replyCount})` : 'Hide replies';
    }
  }

  // Handle "Show more replies"
  if (target.classList.contains('show-more-replies-btn')) {
    event.preventDefault();
    const commentId = target.dataset.commentId;
    const extraReplies = document.getElementById('extra-replies-' + commentId);

    if (extraReplies) {
      extraReplies.style.display = 'block';
      target.style.display = 'none';
    }
  }
});

// ✅ Handle comment form submission inside the modal via AJAX
document.getElementById('modalBody').addEventListener('submit', function (event) {
  const form = event.target;
  

  if (form.id === 'modal-comment-form') {
    event.preventDefault(); // Stop full page reload

    const postId = form.dataset.postId;
    const formData = new FormData(form);

    fetch(`/modal/${postId}/`, {
      method: 'POST',
      headers: {
        'X-CSRFToken': getCookie('csrftoken'),
      },
      body: formData,
    })
    .then(response => response.text())
    .then(html => {
      // Reload the modal with updated content
      document.getElementById('modalBody').innerHTML = html;
    })
    .catch(error => console.error('Comment submit failed:', error));
  }


  // ✅ Reply form (identified by class or action URL pattern)

.then(response => {

})

  }
});








// CSRF helper
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let cookie of cookies) {
            cookie = cookie.trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
