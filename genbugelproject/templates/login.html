{% extends 'base.html' %}
{% load static %}

{% block content %}
<div style="max-width: 400px; margin: 60px auto; padding: 40px 28px;
    background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);">

    <h2 style="font-weight: 600; font-size: 26px; margin-bottom: 8px; text-align: center;">
        Log in to Baytruyen
    </h2>
    <p style="text-align: center; color: #888; font-size: 14px; margin-bottom: 28px;">
        Read and share stories that matter
    </p>

    {% if form.errors %}
    <div style="background: #fff0f0; border: 1px solid #ffcccc; border-radius: 8px;
        padding: 10px 14px; margin-bottom: 16px; color: #cc0000; font-size: 14px;">
        Your username/email or password did not match. Please try again.
    </div>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
        <div style="margin-bottom: 12px;">
            <input type="text" name="username" placeholder="Username or email"
                style="width: 100%; padding: 12px; border: 1px solid #ddd;
                border-radius: 8px; font-size: 15px; box-sizing: border-box;"
                required autofocus>
        </div>
        <div style="margin-bottom: 20px;">
            <input type="password" name="password" placeholder="Password"
                style="width: 100%; padding: 12px; border: 1px solid #ddd;
                border-radius: 8px; font-size: 15px; box-sizing: border-box;"
                required>
        </div>
        <button type="submit"
            style="width: 100%; padding: 12px; background: #000; color: white;
            border: none; border-radius: 50px; font-size: 16px;
            font-weight: 600; cursor: pointer;">
            Log in
        </button>
        <div style="text-align: center; margin-top: 16px;">
            <a href="{% url 'password_reset' %}" style="color: #888; font-size: 13px;">
                Forgot password?
            </a>
        </div>
        <div style="text-align: center; margin-top: 12px;">
            <a href="{% url 'signup' %}" style="color: #3273dc; font-size: 14px; font-weight: 500;">
                Create an account
            </a>
        </div>
    </form>
</div>
{% endblock %}
