{% extends 'base.html' %}
{% load static %}

{% block content %}
<div style="max-width: 400px; margin: 60px auto; padding: 40px 28px; 
    background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);">
    
    <h2 style="font-weight: 600; font-size: 24px; margin-bottom: 8px; text-align: center;">
        Reset your password
    </h2>
    <p style="text-align: center; color: #888; font-size: 14px; margin-bottom: 28px;">
        Enter your email and we'll send you a reset link
    </p>

    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 16px;">
            <input type="email" name="email" placeholder="Email address"
                style="width: 100%; padding: 12px; border: 1px solid #ddd; 
                border-radius: 8px; font-size: 15px; box-sizing: border-box;"
                required autofocus>
        </div>
        <button type="submit"
            style="width: 100%; padding: 12px; background: #000; color: white;
            border: none; border-radius: 50px; font-size: 16px; 
            font-weight: 600; cursor: pointer;">
            Send reset link
        </button>
        <div style="text-align: center; margin-top: 16px;">
            <a href="/" style="color: #888; font-size: 13px;">Back to Baytruyen</a>
        </div>
    </form>
</div>
{% endblock %}
