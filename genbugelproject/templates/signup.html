{% load static %}

<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hello Bulma!</title>
    <link rel="stylesheet" href="{% static 'css/bulma.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet">
  </head>
  <body>


  <section class="section">
    <div class="container">

<div class="columns is-mobile is-centered">
  <div class="column" style="max-width: 400px;">

    <div class="card" style="border-radius: 0;">
      <div class="px-5 py-4 is-flex is-align-items-center" style="justify-content: flex-start; margin-bottom: 0px;">
                
                <h1 style="                                    
                  font-weight: 500;
                  font-size: 38px;                  
                 ">
                  BUGEL
                </h1>
              </div>
    <div class="card-content has-text-centered">   
     
  <form method="post" action="" role="form">
    {% csrf_token %}
    <h1 style="font-weight: 500; font-size: 22px;">Create an account</h1>
    <br>
    

    <div class="field mb-4">
      <p class="control has-icons-left">
        {{ form.username }}
        <span class="icon is-small is-left">
          <i class="fas fa-user"></i>
        </span>
      </p>
    </div>

    <div class="field mb-4">
      <p class="control has-icons-left">
        {{ form.email }}
        <span class="icon is-small is-left">
          <i class="fas fa-envelope"></i>
        </span>
      </p>
    </div>

    <div class="field mb-4">
      <p class="control has-icons-left">
        {{ form.password }}
        <span class="icon is-small is-left">
          <i class="fas fa-lock"></i>
        </span>
      </p>
    </div>

    <div class="field mb-4">
      <p class="control has-icons-left">
        {{ form.confirm_password }}
        <span class="icon is-small is-left">
          <i class="fas fa-lock"></i>
        </span>
      </p>
    </div>

    <div class="field">
      <p class="control">
        <button type="submit" class="button" style="background-color: #61c5ff; width: 280px; height: 45px;" >
          Create
        </button>
      </p>
    </div>
    
    <div class="field mt-4">
  <p class="control">
    <a href="{% url 'login' %}" class="button is-text" style="width: 280px;">
      Already have an account? Login
    </a>
  </p>
</div>

  </form>
</div>



      </div>
</div>


    </div>
  </section>

    
  </div>
